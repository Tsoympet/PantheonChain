name: Build Test Devnet

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:

  tokenomics-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Supply cap invariants
        run: python3 scripts/economics/check_supply_caps.py
      - name: Emission schedule invariants
        run: python3 scripts/economics/check_emission_schedule.py
      - name: Reward path checks
        run: python3 scripts/economics/check_reward_paths.py
      - name: Decimal consistency checks
        run: python3 scripts/economics/check_decimal_consistency.py
      - name: Stress-test scenarios
        run: python3 scripts/economics/stress_test_tokenomics.py

  placeholder-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Placeholder gate
        run: ./scripts/placeholder-gate.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build python3 curl clang-format \
            libssl-dev libboost-system-dev libboost-filesystem-dev \
            libboost-thread-dev libboost-program-options-dev
      - name: Cache build directory
        uses: actions/cache@v5
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt') }}
      - name: Repository audit
        run: ./scripts/repo-audit.sh
      - name: Build
        run: ./scripts/build.sh

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build python3 curl \
            libssl-dev libboost-system-dev libboost-filesystem-dev \
            libboost-thread-dev libboost-program-options-dev
      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt') }}
      - name: Build (cache fallback)
        run: test -d build || ./scripts/build.sh
      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

  integration-devnet-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build python3 curl \
            libssl-dev libboost-system-dev libboost-filesystem-dev \
            libboost-thread-dev libboost-program-options-dev
      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt') }}
      - name: Build (cache fallback)
        run: test -d build || ./scripts/build.sh
      - name: Integration smoke
        run: ./scripts/test.sh
      - name: Stop devnet
        if: always()
        run: xargs -r kill < <(cat .devnet/*.pid) || true
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: devnet-logs
          path: .devnet/logs


  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint
        run: ./scripts/lint.sh
