name: Mobile iOS Installer

on:
  workflow_call:
    secrets:
      EXPO_TOKEN:
        required: false
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'clients/mobile/react-native/**'
      - '.github/workflows/mobile-ios-installer.yml'

jobs:
  build-ios-installer:
    name: Build iOS IPA Installer
    runs-on: macos-14
    permissions:
      contents: read
    defaults:
      run:
        working-directory: clients/mobile/react-native

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate Expo SDK compatibility
        run: |
          node -e "const fs=require('fs'); const app=JSON.parse(fs.readFileSync('app.json','utf8')); const sdk=String(app?.expo?.sdkVersion || '0'); const major=parseInt(sdk.split('.')[0],10)||0; if(major<50){ console.error(\`Expo SDK \${sdk} is unsupported by EAS Build managed workflow. Upgrade to SDK 50+.\`); process.exit(1);} console.log(\`Expo SDK \${sdk} is compatible.\`);"

      - name: Select Xcode 16
        run: |
          # React Native 0.81 requires Xcode >= 16.1; select the latest Xcode 16 available
          XCODE=$(find /Applications -maxdepth 1 -name "Xcode_16*.app" -type d | sort | tail -1)
          sudo xcode-select --switch "${XCODE}/Contents/Developer"
          xcodebuild -version

      - name: Generate iOS native directory
        run: npx expo prebuild --clean --platform ios --non-interactive

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod --version

      - name: Install CocoaPods dependencies
        working-directory: clients/mobile/react-native/ios
        run: pod install

      - name: Build iOS app for simulator
        working-directory: clients/mobile/react-native/ios
        run: |
          WORKSPACE=$(find . -maxdepth 2 -name "*.xcworkspace" -not -path "*/Pods/*" | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "No Xcode workspace found after expo prebuild" >&2
            exit 1
          fi
          SCHEME=$(basename "${WORKSPACE%.xcworkspace}")
          # Build for simulator — no code-signing or provisioning profile required.
          # For device/App Store distribution use EAS Build (eas.json ios-release profile).
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SWIFT_STRICT_CONCURRENCY=minimal

      - name: Package iOS simulator artifact
        run: |
          # For a simulator build, derivedDataPath/Build/Products/Release-iphonesimulator/
          APP=$(find ios/build/Build/Products/Release-iphonesimulator -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "No iOS simulator .app found after build" >&2
            exit 1
          fi
          zip -r parthenon-mobile-ios-simulator.zip "$APP"

      - name: Upload iOS simulator artifact
        uses: actions/upload-artifact@v7
        with:
          name: parthenon-mobile-ios-simulator
          path: clients/mobile/react-native/parthenon-mobile-ios-simulator.zip
          retention-days: 14
